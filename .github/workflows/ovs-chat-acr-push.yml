# Build linux/amd64 OVS natively on self-hosted runner + push to ACR via docker.
# Native build => native .node addons are real x86-64 ELF (not Mach-O).
# Repo var: ACR_REGISTRY (includes namespace). Secrets: ACR_USERNAME, ACR_PASSWORD.
# Author: kejiqing
name: OVS Chat ACR Push

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to build
        type: string
        default: ovs-chat-v1.109.5
      tag:
        description: Image tag
        type: string
        default: 1.109.5-ovs-chat-amd64

env:
  NPM_REGISTRY: https://registry.npmmirror.com
  IMAGE_NAME: openvscode-server
  VSCODE_ARCH: x64
  NPM_ARCH: x64

jobs:
  build-push:
    name: linux-amd64 -> ACR
    runs-on: self-hosted
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup system deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config dbus xvfb libgtk-3-0 libxkbfile-dev libkrb5-dev libgbm1 \
            python3 make g++ jq patch ca-certificates
          sudo cp build/azure-pipelines/linux/xvfb.init /etc/init.d/xvfb
          sudo chmod +x /etc/init.d/xvfb
          sudo update-rc.d xvfb defaults || true
          sudo service xvfb start || true

      - name: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          npm_config_arch: x64
        run: |
          set -e
          npm config set registry "$NPM_REGISTRY"
          cd build && npm ci && cd ..
          source ./build/azure-pipelines/linux/setup-env.sh
          node build/npm/preinstall.ts
          npm ci

      - name: Compile reh-web (linux-x64)
        env:
          DISABLE_V8_COMPILE_CACHE: 1
        run: |
          set -e
          npm run gulp core-ci
          npm run gulp extensions-ci
          npm run gulp minify-vscode-reh-web
          npm run gulp vscode-reh-web-linux-x64-min-ci

      - name: Package ovs-chat-demo VSIX
        run: |
          chmod +x scripts/ovs-chat/package-ovs-extension-vsix.sh
          bash scripts/ovs-chat/package-ovs-extension-vsix.sh

      - name: Bundle tarball
        id: bundle
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          name="openvscode-server-v${version}-linux-x64"
          mv "vscode-reh-web-linux-x64" "${name}"
          tar -czf "${name}.tar.gz" "${name}"
          echo "tarball=${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Validate native addons are x86-64 ELF
        run: |
          set -e
          tmp="$(mktemp -d)"
          tar -xzf "${{ steps.bundle.outputs.tarball }}" -C "$tmp"
          bad=0
          while IFS= read -r -d '' f; do
            case "$f" in */windows.node|*win32-*) continue ;; esac
            if ! file "$f" | grep -Eq 'ELF 64-bit LSB.*x86-64'; then
              echo "BAD: ${f#$tmp/}"; file "$f"; bad=$((bad+1))
            fi
          done < <(find "$tmp" -name '*.node' -print0)
          [ "$bad" -eq 0 ] || { echo "native addon validation failed"; exit 1; }
          echo "native addons OK"

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ vars.ACR_REGISTRY }}" \
            -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and push image
        run: |
          set -e
          IMG="${{ vars.ACR_REGISTRY }}/${IMAGE_NAME}:${{ inputs.tag }}"
          docker build --platform linux/amd64 \
            -f scripts/ovs-chat/Dockerfile.ci \
            --build-arg "TARBALL=${{ steps.bundle.outputs.tarball }}" \
            -t "$IMG" .
          docker push "$IMG"
          echo "PUSHED: $IMG"
