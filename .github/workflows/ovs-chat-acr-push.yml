# Build linux/arm64 OVS + push image to Aliyun ACR (single job, arm64 only).
# Secrets: ACR_USERNAME, ACR_PASSWORD
# Author: kejiqing
name: OVS Chat ACR Push

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to build
        type: string
        default: ovs-chat-v1.109.5
      tag:
        description: Image tag suffix
        type: string
        default: 1.109.5-ovs-chat

env:
  NPM_REGISTRY: https://registry.npmmirror.com
  ACR_REGISTRY: crpi-cf9vxpq3n8or17mw.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: passionke
  IMAGE_NAME: openvscode-server

jobs:
  build-push:
    name: linux-arm64 → ACR
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      NPM_ARCH: arm64
      VSCODE_ARCH: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup system (xvfb)
        run: |
          set -e
          ./build/azure-pipelines/linux/apt-retry.sh sudo apt-get update
          ./build/azure-pipelines/linux/apt-retry.sh sudo apt-get install -y pkg-config dbus xvfb libgtk-3-0 libxkbfile-dev libkrb5-dev libgbm1
          sudo cp build/azure-pipelines/linux/xvfb.init /etc/init.d/xvfb
          sudo chmod +x /etc/init.d/xvfb
          sudo update-rc.d xvfb defaults
          sudo service xvfb start

      - name: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          npm_config_arch: ${{ env.NPM_ARCH }}
        run: |
          set -e
          npm config set registry "$NPM_REGISTRY"
          cd build && npm ci && cd ..
          source ./build/azure-pipelines/linux/setup-env.sh
          node build/npm/preinstall.ts
          npm ci

      - name: Compile reh-web (linux-arm64)
        env:
          DISABLE_V8_COMPILE_CACHE: 1
        run: |
          set -e
          npm run gulp core-ci
          npm run gulp extensions-ci
          npm run gulp minify-vscode-reh-web
          npm run gulp vscode-reh-web-linux-${{ env.VSCODE_ARCH }}-min-ci

      - name: Package ovs-chat-demo VSIX
        run: |
          chmod +x scripts/ovs-chat/package-ovs-extension-vsix.sh
          bash scripts/ovs-chat/package-ovs-extension-vsix.sh

      - name: Bundle tarball
        id: bundle
        run: |
          set -e
          version=$(node -p "require('./package.json').version")
          name="openvscode-server-v${version}-linux-${{ env.VSCODE_ARCH }}"
          mv "vscode-reh-web-linux-${{ env.VSCODE_ARCH }}" "${name}"
          tar -czf "${name}.tar.gz" "${name}"
          echo "tarball=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            openvscode-server-v*-linux-arm64.tar.gz
            .build/ovs-chat-demo.vsix

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/ovs-chat/Dockerfile.ci
          platforms: linux/arm64
          push: true
          build-args: |
            TARBALL=${{ steps.bundle.outputs.tarball }}
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:ovs-chat-arm64
